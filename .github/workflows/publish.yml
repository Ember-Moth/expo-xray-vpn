name: Publish expo-xray-vpn

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version bump (patch | minor | major | prerelease)'
        required: true
        default: 'patch'
        type: choice
        options: [patch, minor, major, prerelease]
  push:
    tags: ['v*']

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: libXray/go.mod

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          gomobile init
        working-directory: libXray

      - name: Build libXray AAR
        run: |
          python3 build/main.py android
        working-directory: libXray
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME || '/usr/local/lib/android/sdk' }}

      - name: Copy AAR to module
        run: |
          cp libXray/libXray.aar android/libs/libXray.aar

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: |
          npm install --ignore-scripts

      - name: Build TypeScript
        run: |
          npx tsc

      - name: Bump version (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name 'github-actions'
          git config user.email 'github-actions@github.com'
          npm version ${{ inputs.version }} -m "chore(release): v%s"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push version commit and tag
        if: github.event_name == 'workflow_dispatch'
        run: |
          git push origin HEAD:main --follow-tags
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to npm
        run: |
          unset NODE_AUTH_TOKEN
          npm publish

      - name: Publish AAR to GitHub Packages
        run: |
          VERSION=$(node -p "require('./package.json').version")
          export LIBXRAY_VERSION="$VERSION"
          cd libXray/publish
          ./gradlew publishAarPublicationToGitHubPackagesRepository
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          files: android/libs/libXray.aar
          generate_release_notes: true
